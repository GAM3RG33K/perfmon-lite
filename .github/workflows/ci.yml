name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  # ─── Build, Vet & Unit Tests ──────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: go build -o perfmon -ldflags="-s -w" ./cmd/perfmon/

      - name: Vet
        run: go vet ./...

      - name: Test (unit)
        run: go test -v -race -count=1 ./... 2>&1

      - name: Binary smoke test
        run: |
          ./perfmon --version
          ./perfmon --help
          echo "Binary smoke test OK"

      - name: Upload binary (linux/amd64)
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: perfmon-linux-amd64
          path: perfmon
          retention-days: 7
          overwrite: true

  # ─── Cross-platform Build ─────────────────────────────────────────────
  cross-build:
    name: Cross-platform Build
    if: github.event_name != 'push' || github.ref_name != 'main'
    needs: [build-and-test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o perfmon-${{ matrix.goos }}-${{ matrix.goarch }}$ext \
            -ldflags="-s -w" ./cmd/perfmon/
          ls -lh perfmon-${{ matrix.goos }}-${{ matrix.goarch }}$ext

      - name: Upload binary
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: perfmon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: perfmon-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          retention-days: 7
          overwrite: true

  # ─── ADB Integration Tests (Android emulator) ─────────────────────────
  adb-integration:
    name: ADB Integration Tests
    if: github.event_name != 'push' || github.ref_name != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        api-level: [34]
        target: [google_apis]
        arch: [x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      # Pin the Android SDK root to the pre-installed location so the emulator
      # action uses the existing SDK instead of downloading fresh copies via
      # sdkmanager (which may extract platform-tools without +x permissions).
      - name: Configure Android SDK
        run: |
          SDK_ROOT="/usr/local/lib/android/sdk"
          if [ -d "$SDK_ROOT" ]; then
            echo "ANDROID_HOME=$SDK_ROOT" >> $GITHUB_ENV
            echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
            echo "Android SDK found at $SDK_ROOT"
          else
            echo "Pre-installed SDK not found, will use action default"
          fi

      - name: Ensure ADB is executable
        run: |
          ADB_PATH="/usr/local/lib/android/sdk/platform-tools/adb"
          if [ -x "$ADB_PATH" ]; then
            echo "ADB already executable at $ADB_PATH"
          elif [ -f "$ADB_PATH" ]; then
            echo "ADB exists but not executable — fixing permissions"
            sudo chmod +x "$ADB_PATH"
            echo "Permissions fixed"
          else
            echo "ADB not at expected path, searching..."
            FOUND_ADB=$(find /usr/local/lib /opt -name adb -type f 2>/dev/null | head -1)
            if [ -n "$FOUND_ADB" ]; then
              echo "Found ADB at $FOUND_ADB"
              sudo chmod +x "$FOUND_ADB"
            else
              echo "ADB binary not found — will be installed by emulator runner"
            fi
          fi
          command -v adb && adb --version || echo "adb not in PATH yet"

      - name: ADB Integration Tests (with emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          emulator-options: -no-snapshot -no-window -no-audio -gpu auto -memory 2048
          disable-animations: true
          script: |
            echo "=== Emulator ready ==="
            adb devices -l
            cd ${{ github.workspace }}
            go test -tags=adb_test -v -race -count=1 -timeout 300s ./internal/platform/android/

  # ─── GitHub Release (tag push only) ────────────────────────────────────
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [cross-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer scripts as release assets
        run: |
          TAG="${GITHUB_REF_NAME}"
          for script in scripts/install.sh scripts/update.sh scripts/uninstall.sh scripts/install.ps1 scripts/update.ps1 scripts/uninstall.ps1 scripts/worker.js; do
            echo "  uploading ${script}..."
            gh release upload "$TAG" "$script" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
