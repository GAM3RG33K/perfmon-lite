# GoReleaser configuration for perfmon
# https://goreleaser.com
version: 2
project_name: perfmon

before:
  hooks:
    - go mod tidy

builds:
  - id: perfmon-linux
    main: ./cmd/perfmon/
    binary: perfmon-tool
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - cmd: "./.goreleaser/post-build.sh {{ .Path }} {{ .Name }}"
          output: true

  - id: perfmon-darwin-amd64
    main: ./cmd/perfmon/
    binary: perfmon-tool
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
    hooks:
      post:
        - cmd: "./.goreleaser/post-build.sh {{ .Path }} {{ .Name }}"
          output: true

  - id: perfmon-darwin-arm64
    main: ./cmd/perfmon/
    binary: perfmon-tool
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    hooks:
      post:
        - cmd: "./.goreleaser/post-build.sh {{ .Path }} {{ .Name }}"
          output: true

  - id: perfmon-windows
    main: ./cmd/perfmon/
    binary: perfmon-tool
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    hooks:
      post:
        - cmd: "./.goreleaser/post-build.sh {{ .Path }} {{ .Name }}"
          output: true

universal_binary:
  - id: perfmon-darwin-universal
    ids:
      - perfmon-darwin-amd64
      - perfmon-darwin-arm64
    name_template: "perfmon-tool-{{ .Version }}-darwin-universal"

archives:
  - id: linux-binaries
    builds: [perfmon-linux]
    name_template: "perfmon-tool-{{ .Version }}-linux-{{ .Arch }}"
    formats: ["binary"]

  - id: darwin-universal
    builds: [perfmon-darwin-universal]
    name_template: "perfmon-tool-{{ .Version }}-darwin-universal"
    formats: ["binary"]

  - id: windows-binaries
    builds: [perfmon-windows]
    name_template: "perfmon-tool-{{ .Version }}-windows-{{ .Arch }}"
    formats: ["binary"]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs: []

release:
  github:
    owner: GAM3RG33K
    name: perfmon-lite
  header: |
    ## perfmon {{ .Version }}

    Performance Monitor & Profiler — CPU, memory, and thread telemetry for mobile apps.

    ### Installation
    ```bash
    # macOS (Universal)
    curl -LO https://github.com/GAM3RG33K/perfmon-lite/releases/download/{{ .Tag }}/perfmon-tool-{{ .Version }}-darwin-universal
    chmod +x perfmon-tool-{{ .Version }}-darwin-universal
    sudo mv perfmon-tool-{{ .Version }}-darwin-universal /usr/local/bin/perfmon

    # Linux (x86_64)
    curl -LO https://github.com/GAM3RG33K/perfmon-lite/releases/download/{{ .Tag }}/perfmon-tool-{{ .Version }}-linux-amd64
    chmod +x perfmon-tool-{{ .Version }}-linux-amd64
    sudo mv perfmon-tool-{{ .Version }}-linux-amd64 /usr/local/bin/perfmon
    ```
  footer: |
    ### Checksums
    ```
    {{ .Checksums }}
    ```
  name_template: "v{{ .Version }}"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([^\)]+\))?[:\s].+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([^\)]+\))?[:\s].+$'
      order: 1
    - title: Maintenance
      regexp: '^.*?chore(\([^\)]+\))?[:\s].+$'
      order: 2
    - title: Documentation
      regexp: '^.*?docs(\([^\)]+\))?[:\s].+$'
      order: 3
    - title: Tests
      regexp: '^.*?test(\([^\)]+\))?[:\s].+$'
      order: 4
    - title: Other
      order: 5
  filters:
    exclude:
      - "^docs:"
      - "^test:"
